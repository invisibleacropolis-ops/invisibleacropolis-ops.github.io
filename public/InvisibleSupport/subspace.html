<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SubSpace - 3D Grid Terrain</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: Arial, sans-serif;
        }

        #container {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        #info {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 14px;
            z-index: 100;
            text-shadow: 0 0 5px black;
        }

        #backButton {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 10px 15px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: 1px solid #fff;
            border-radius: 4px;
            cursor: pointer;
            z-index: 100;
        }

        #backButton:hover {
            background: rgba(50, 50, 50, 0.9);
        }
    </style>
</head>

<body>
    <div id="container"></div>
    <div id="error-log"
        style="position:fixed; top:50px; left:10px; color:red; background:rgba(0,0,0,0.8); z-index:1000; padding:10px; display:none;">
    </div>
    <script>
        window.onerror = function (msg, url, line, col, error) {
            const log = document.getElementById('error-log');
            log.style.display = 'block';
            log.innerHTML += `<div>Error: ${msg} <br>URL: ${url} <br>Line: ${line}</div><hr>`;
            console.error('Captured Error:', msg, error);
        };
        // Capture unhandled promise rejections (like import failures)
        window.addEventListener('unhandledrejection', function (event) {
            const log = document.getElementById('error-log');
            log.style.display = 'block';
            log.innerHTML += `<div>Promise Error: ${event.reason}</div><hr>`;
        });
    </script>
    <div id="info">SubSpace - 3D Grid Terrain Visualization</div>
    <button id="backButton" onclick="window.location.href='index.html'">Back to Portal</button>

    <!-- Import Three.js from node_modules -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.182.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.182.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000022);

        // Camera setup
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(15, 15, 15);

        // Renderer setup
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('container').appendChild(renderer.domElement);

        // Add orbit controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Add lighting
        const ambientLight = new THREE.AmbientLight(0x404040, 3);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 2);
        directionalLight.position.set(1, 1, 1);
        scene.add(directionalLight);

        // Create grid-based terrain with noise variation
        function createTerrain() {
            const size = 50; // Grid size
            const divisions = 50; // Number of divisions

            // Create geometry for the grid
            const geometry = new THREE.PlaneGeometry(size, size, divisions, divisions);

            // Generate noise-based height variations
            const positionAttribute = geometry.getAttribute('position');
            const vertices = positionAttribute.array;

            // Simple noise function
            function noise(x, y) {
                return Math.sin(x * 0.1) * Math.cos(y * 0.15) * 2 +
                    Math.sin(x * 0.05) * Math.cos(y * 0.1) * 3;
            }

            // Modify vertex positions based on noise
            for (let i = 0; i <= divisions; i++) {
                for (let j = 0; j <= divisions; j++) {
                    const idx = (i * (divisions + 1) + j) * 3;
                    const x = vertices[idx];
                    const y = vertices[idx + 1];
                    vertices[idx + 2] = noise(x, y); // Set z position based on noise
                }
            }

            // Update normals for proper lighting
            geometry.computeVertexNormals();

            // Create emissive material
            const material = new THREE.MeshStandardMaterial({
                color: 0x00aaff,
                emissive: 0x0066cc,
                emissiveIntensity: 0.5,
                wireframe: true,
                wireframeLinewidth: 1.5,
                roughness: 0.2,
                metalness: 0.8
            });

            // Create mesh
            const terrain = new THREE.Mesh(geometry, material);
            terrain.rotation.x = -Math.PI / 2; // Rotate to horizontal
            scene.add(terrain);

            return terrain;
        }

        // Create glowing grid lines
        function createGridHelper() {
            const gridHelper = new THREE.GridHelper(50, 50, 0x00aaff, 0x0066cc);
            gridHelper.material.opacity = 0.5;
            gridHelper.material.transparent = true;
            scene.add(gridHelper);
            return gridHelper;
        }

        // Create the terrain
        const terrain = createTerrain();
        const gridHelper = createGridHelper();

        // Add coordinate axes helper
        const axesHelper = new THREE.AxesHelper(10);
        scene.add(axesHelper);

        // Handle window resize
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.addEventListener('resize', onWindowResize);

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);

            // Rotate terrain slowly
            terrain.rotation.z += 0.001;

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>

</html>
